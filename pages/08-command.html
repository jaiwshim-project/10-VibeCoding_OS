<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCOS — 명령어 생성 (리다이렉트)</title>
<meta http-equiv="refresh" content="0; url=07-command.html">
<link rel="stylesheet" href="../vcos.css">
<style>
/* 07 명령어 생성 */
.output-wrap { position:relative }
.output-cmd {
  background:#0d1b2e;border:1.5px solid #1e3a5f;
  border-radius:var(--r-md);padding:20px 22px;
  font-family:'JetBrains Mono','Fira Code',monospace;
  font-size:12px;line-height:1.9;white-space:pre-wrap;word-break:break-all;
  color:#e2e8f0;max-height:600px;overflow-y:auto;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.15);
}
.action-strip { display:flex;gap:8px;flex-wrap:wrap;margin-top:12px }

.summary-grid {
  display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:10px;margin-bottom:18px;
}
.summary-item {
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:var(--r-md);padding:16px 12px;text-align:center;
  box-shadow:var(--shadow-xs);
  transition:transform var(--med),box-shadow var(--med);
}
.summary-item:hover { transform:translateY(-2px);box-shadow:var(--shadow-md) }
.summary-icon  { font-size:24px;margin-bottom:5px }
.summary-label { font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:700 }
.summary-val   { font-size:13.5px;font-weight:800;color:var(--text);margin-top:3px }

.tab-bar2 { display:flex;gap:5px;margin-bottom:13px;flex-wrap:wrap }
.tab2 {
  padding:7px 16px;border-radius:var(--r-full);
  border:1.5px solid var(--border);background:var(--bg);
  color:var(--text2);font-size:12px;cursor:pointer;
  font-weight:500;transition:all var(--fast);
}
.tab2:hover  { border-color:var(--accent);color:var(--accent);background:var(--accent-light) }
.tab2.active {
  border-color:var(--accent);color:var(--accent);
  background:var(--accent-light);font-weight:700;
}

.ready-box {
  background:var(--green-bg);border:1.5px solid rgba(22,163,74,.25);
  border-radius:var(--r-lg);padding:18px;margin-bottom:18px;
  border-left:4px solid var(--green);
}
.checklist-item { display:flex;align-items:center;gap:8px;padding:5px 0 }
.check-icon     { font-size:14px;flex-shrink:0 }
.check-text     { font-size:12.5px;color:var(--text2);font-weight:500 }
</style>
</head>
<body>
<div class="vcos-header"><div id="navArea"></div></div>
<div class="container"><div class="page-body">

<div class="progress-steps" id="progressBar"></div>

<div class="page-title">
  <div class="page-num" style="background:linear-gradient(135deg,#38bdf8,#0369a1);box-shadow:0 3px 12px rgba(3,105,161,.4)">7</div>
  <div><div class="page-name">Claude Code 명령어 생성</div><div class="page-eng">Vibe Command Generator — 1~6 섹션 통합 → 완성 바이브 코딩 명령어</div></div>
  <div class="page-badge">FINAL OUTPUT</div>
</div>

<div id="content"></div>

<div class="page-nav">
  <a href="07-refinement.html" class="btn btn-secondary">← 이전: 고도화 엔진</a>
  <div class="page-nav-center">Section 7 / 7</div>
  <a href="../index.html" class="btn btn-secondary">🏠 허브로 돌아가기</a>
</div>

</div></div>
<div id="footerArea"></div>
<script src="../vcos.js"></script>
<script>
document.getElementById('navArea').innerHTML = buildNav('7', false);
document.getElementById('progressBar').innerHTML = buildProgress('7');
document.getElementById('footerArea').innerHTML = buildFooter(false);

const p = requireProject('../pages/01-intent.html');
if (!p) throw new Error('no project');

const c = calcComplexity(p);
const type = getProjectType(c.total);
const squads = buildSquads(p, c);
const skills = getRelevantSkills(p, c).filter(s => s.active);
const tk = calcTokenEstimate(c);
const [v1, v2, v3, v4] = calcRefineScores(c);

const cmd = generateCommand(p, c);

let activeTab = 'full';

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab2').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  renderCmd();
}

function getTabContent() {
  if (activeTab === 'full') return cmd;
  if (activeTab === 'mission') {
    const feats = (p.features||[]).map(f => `- ${FEATURE_LABELS[f]||f}`).join('\n') || '- (기능 목록)';
    return `## 📋 PROJECT INTENT\n\nProject : ${p.name||''}\nPurpose : ${p.purpose||''}\nUsers   : ${Array.isArray(p.users)?p.users.join(', '):''}\nType    : ${type.label}\nStack   : ${p.techStack||''}\n\n## 🎯 MISSION\n\n${p.purpose||p.name+' 플랫폼'}\n\n핵심 기능:\n${feats}`;
  }
  if (activeTab === 'squad') {
    const squadDesc = squads.filter(s=>s.id!=='hq').map(s => `- ${s.name}: ${s.role}\n  요원: ${s.agents.map(a=>a.name).join(', ')}`).join('\n\n');
    return `## 👥 AI DEVELOPMENT ORGANIZATION\n\n소대 편성 명령: ${type.type === 'Small' || type.type === 'Medium' ? '/platoon-formation-v1' : '/platoon-formation-v2'}\n투입 분대: ${squads.length}개 / 총 요원: ${squads.reduce((s,q)=>s+q.agents.length,0)}명\n\n${squadDesc}`;
  }
  if (activeTab === 'skills') {
    return `## ⚡ SKILL EXECUTION STRATEGY\n\n프로젝트 적용 스킬 (${skills.length}개):\n\n${skills.map(s=>`${s.emoji} ${s.name}\n   시점: ${s.when}\n   모델: ${s.model}\n   명령: ${s.cmd}`).join('\n\n')}`;
  }
  return cmd;
}

function renderCmd() {
  const content = getTabContent();
  document.getElementById('cmdOutput').textContent = content;
}

// Download handler
function downloadCmd() {
  const blob = new Blob([cmd], { type:'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (p.name||'vcos-command').replace(/[^a-z0-9가-힣]/gi,'_') + '_vcos.md';
  a.click();
}

const savedTime = p.savedAt ? new Date(p.savedAt).toLocaleString('ko-KR') : '알 수 없음';

document.getElementById('content').innerHTML = `
<div class="ready-box">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
    <span style="font-size:24px">✅</span>
    <div>
      <div style="font-size:14px;font-weight:700;color:var(--green)">바이브 코딩 명령어 생성 완료!</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">1~6 섹션 데이터를 통합하여 Claude Code 실행 명령어를 생성했습니다. 복사 후 터미널에 붙여넣으세요.</div>
    </div>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:8px">
    <div class="checklist-item"><span class="check-icon">✅</span><span class="check-text">프로젝트: ${p.name}</span></div>
    <div class="checklist-item"><span class="check-icon">✅</span><span class="check-text">복잡도: ${type.label} (${c.total}점)</span></div>
    <div class="checklist-item"><span class="check-icon">✅</span><span class="check-text">분대: ${squads.length}개 편성</span></div>
    <div class="checklist-item"><span class="check-icon">✅</span><span class="check-text">스킬: ${skills.length}개 선택</span></div>
    <div class="checklist-item"><span class="check-icon">✅</span><span class="check-text">목표 점수: ${v4}점</span></div>
    <div class="checklist-item"><span class="check-icon">✅</span><span class="check-text">예상 비용: $${tk.total}</span></div>
  </div>
</div>

<div class="summary-grid">
  <div class="summary-item">
    <div class="summary-icon">📋</div>
    <div class="summary-label">프로젝트</div>
    <div class="summary-val" style="font-size:11px">${(p.name||'').length>15 ? (p.name||'').slice(0,15)+'…' : (p.name||'')}</div>
  </div>
  <div class="summary-item">
    <div class="summary-icon">🎯</div>
    <div class="summary-label">프로젝트 타입</div>
    <div class="summary-val" style="color:${type.color}">${type.label}</div>
  </div>
  <div class="summary-item">
    <div class="summary-icon">🏛️</div>
    <div class="summary-label">투입 분대</div>
    <div class="summary-val">${squads.length}개 분대</div>
  </div>
  <div class="summary-item">
    <div class="summary-icon">🧩</div>
    <div class="summary-label">활성 스킬</div>
    <div class="summary-val">${skills.length}개</div>
  </div>
  <div class="summary-item">
    <div class="summary-icon">💰</div>
    <div class="summary-label">예상 비용</div>
    <div class="summary-val">$${tk.total}</div>
  </div>
  <div class="summary-item">
    <div class="summary-icon">⭐</div>
    <div class="summary-label">목표 품질</div>
    <div class="summary-val" style="color:var(--green)">${v4}점</div>
  </div>
</div>

<div class="tab-bar2">
  <button class="tab2 active" data-tab="full" onclick="setTab('full')">📄 전체 명령어</button>
  <button class="tab2" data-tab="mission" onclick="setTab('mission')">🎯 Mission 파트</button>
  <button class="tab2" data-tab="squad" onclick="setTab('squad')">🪖 Squad 파트</button>
  <button class="tab2" data-tab="skills" onclick="setTab('skills')">⚡ Skills 파트</button>
</div>

<div class="output-wrap">
  <pre class="output-cmd" id="cmdOutput"></pre>
  <div class="action-strip">
    <button class="btn btn-primary btn-lg" onclick="copyText(getTabContent(), this)">📋 복사 (현재 탭)</button>
    <button class="btn btn-primary" onclick="copyText(cmd, this)">📋 전체 복사</button>
    <button class="btn btn-success" onclick="downloadCmd()">⬇️ .md 파일 다운로드</button>
    <button class="btn btn-secondary" onclick="location.href='01-intent.html'">✏️ 프로젝트 수정</button>
  </div>
</div>

<div class="divider-label" style="margin-top:28px"><span>실행 가이드</span></div>

<div class="grid-2">
  <div class="card">
    <div class="card-title">🚀 Claude Code 실행 순서</div>
    ${[
      { n:'1', text:`터미널에서 <code style="background:var(--bg);padding:1px 5px;border-radius:3px;font-size:11px">cd 프로젝트_폴더</code> 실행` },
      { n:'2', text:`<code style="background:var(--bg);padding:1px 5px;border-radius:3px;font-size:11px">claude</code> 명령어로 Claude Code 실행` },
      { n:'3', text:`위 명령어를 전체 복사해서 Claude Code에 붙여넣기` },
      { n:'4', text:`분대 편성: <code style="background:var(--bg);padding:1px 5px;border-radius:3px;font-size:11px">${type.type==='Small'||type.type==='Medium' ? '/platoon-formation-v1' : '/platoon-formation-v2'}</code>` },
      { n:'5', text:`개발 완료 후: <code style="background:var(--bg);padding:1px 5px;border-radius:3px;font-size:11px">/review-evaluate</code> 실행 (최소 3회)` },
      { n:'6', text:`${v4}점 이상 달성 시 프로덕션 배포` }
    ].map(step => `
      <div style="display:flex;gap:10px;margin-bottom:8px;align-items:flex-start">
        <div style="width:20px;height:20px;border-radius:50%;background:var(--accent2);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">${step.n}</div>
        <div style="font-size:12px;color:var(--text2);line-height:1.5">${step.text}</div>
      </div>
    `).join('')}
  </div>
  <div class="card">
    <div class="card-title">🪖 용병 AI 병렬 활용</div>
    ${[
      { icon:'💎', name:'Gemini', when:'대규모 코드 리뷰', cmd:'gemini -p "..."' },
      { icon:'🔭', name:'Perplexity', when:'최신 기술 리서치', cmd:'perplexity_ask "..."' },
      { icon:'⚡', name:'Grok', when:'빠른 UI 프로토타입', cmd:'grok -p "..."' },
      { icon:'🤖', name:'ChatGPT', when:'보일러플레이트 생성', cmd:'openai "..."' }
    ].map(m => `
      <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border2)">
        <span style="font-size:16px">${m.icon}</span>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:600">${m.name}</div>
          <div style="font-size:10px;color:var(--text3)">${m.when}</div>
        </div>
        <code style="font-size:9px;color:var(--text3);background:var(--bg);padding:2px 5px;border-radius:3px">${m.cmd}</code>
      </div>
    `).join('')}
    <div style="margin-top:10px;font-size:10px;color:var(--text3);line-height:1.6">
      💡 Claude Code와 용병 AI를 병렬로 운영해 개발 속도를 3~5배 높이세요.
    </div>
  </div>
</div>

<div style="text-align:center;margin-top:28px;padding:20px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)">
  <div style="font-size:13px;color:var(--text2)">저장 시각: ${savedTime}</div>
  <div style="font-size:12px;color:var(--text3);margin-top:4px">Generated by VCOS — Vibe Coding Operating System</div>
  <div style="margin-top:12px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap">
    <a href="../index.html" class="btn btn-secondary">🏠 VCOS 허브</a>
    <button class="btn btn-primary" onclick="copyText(cmd, this)">📋 전체 명령어 복사</button>
    <button class="btn btn-success" onclick="downloadCmd()">⬇️ 파일 다운로드</button>
  </div>
</div>
`;

renderCmd();
</script>
</body>
</html>
